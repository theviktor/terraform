#cloud-config
# Cloud-init for Jambonz Feature Server on Hetzner Cloud

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

write_files:
  - path: /tmp/configure-feature-server.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz Feature Server

      # Variables from Terraform
      MYSQL_HOST="${mysql_host}"
      MYSQL_USER="${mysql_user}"
      MYSQL_PASSWORD="${mysql_password}"
      REDIS_HOST="${redis_host}"
      REDIS_PORT="${redis_port}"
      JWT_SECRET="${jwt_secret}"
      WEB_MONITORING_PRIVATE_IP="${web_monitoring_private_ip}"
      VPC_CIDR="${vpc_cidr}"
      URL_PORTAL="${url_portal}"
      RECORDING_WS_BASE_URL="${recording_ws_base_url}"
      ENABLE_OTEL="${enable_otel}"

      echo "Starting jambonz Feature Server configuration for Hetzner"

      USER=jambonz
      HOME=/home/jambonz

      # Wait for private network metadata (may not be available immediately at boot)
      echo "Waiting for Hetzner private network metadata..."
      PRIVATE_IP=""
      for i in $(seq 1 30); do
          METADATA_RAW=$(curl -s http://169.254.169.254/hetzner/v1/metadata/private-networks)
          PRIVATE_IP=$(echo "$METADATA_RAW" | grep -oP '(?<=ip: )\S+' | head -1)
          if [ -n "$PRIVATE_IP" ]; then
              echo "Got private IP from metadata: '$PRIVATE_IP' (attempt $i/30)"
              break
          fi
          echo "Private network not yet available (attempt $i/30), metadata: $METADATA_RAW"
          sleep 2
      done
      if [ -z "$PRIVATE_IP" ]; then
          echo "FATAL: Could not determine private IP after 60 seconds"
          exit 1
      fi
      INSTANCE_ID=$(curl -s http://169.254.169.254/hetzner/v1/metadata/instance-id 2>/dev/null || hostname)
      echo "INSTANCE_ID: '$INSTANCE_ID'"

      # Wait for Redis to be ready
      echo "Waiting for Redis at $REDIS_HOST:$REDIS_PORT..."
      for i in $(seq 1 60); do
          if redis-cli -h $REDIS_HOST -p $REDIS_PORT ping 2>/dev/null | grep -q PONG; then
              echo "Redis is available"
              break
          fi
          echo "Redis not yet available, attempt $i/60..."
          sleep 10
      done

      # OTEL tracing config
      if [[ "$ENABLE_OTEL" == "true" ]]; then
        OTEL_ENABLED=1
      else
        OTEL_ENABLED=0
      fi

      echo "Writing $HOME/apps/ecosystem.config.js..."

      cat << EOF > $HOME/apps/ecosystem.config.js
      module.exports = {
      apps : [
      {
          name: 'feature-server',
          cwd: '$HOME/apps/feature-server',
          script: 'app.js',
          instance_var: 'INSTANCE_ID',
          out_file: '$HOME/.pm2/logs/feature-server.log',
          err_file: '$HOME/.pm2/logs/feature-server.log',
          exec_mode: 'fork',
          instances: 'max',
          autorestart: true,
          watch: false,
          max_memory_restart: '5G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JAMBONES_TTS_TRIM_SILENCE: 1,
            JWT_SECRET: '$JWT_SECRET',
            JAMBONES_API_BASE_URL: 'http://$URL_PORTAL/v1',
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            JAMBONES_OTEL_ENABLED: $OTEL_ENABLED,
            OTEL_EXPORTER_JAEGER_ENDPOINT: 'http://$WEB_MONITORING_PRIVATE_IP:14268/api/traces',
            OTEL_EXPORTER_OTLP_METRICS_INSECURE: 1,
            OTEL_EXPORTER_JAEGER_GRPC_INSECURE: 1,
            JAMBONES_NETWORK_CIDR: '$VPC_CIDR',
            JAMBONES_MYSQL_HOST: '$MYSQL_HOST',
            JAMBONES_MYSQL_USER: '$MYSQL_USER',
            JAMBONES_MYSQL_PASSWORD: '$MYSQL_PASSWORD',
            JAMBONES_MYSQL_DATABASE: 'jambones',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: '$REDIS_HOST',
            JAMBONES_REDIS_PORT: $REDIS_PORT,

            JAMBONES_TIME_SERIES_HOST: '$WEB_MONITORING_PRIVATE_IP',
            HTTP_PORT: 3000,
            HTTP_PORT_MAX: 3009,
            DRACHTIO_HOST: '127.0.0.1',
            DRACHTIO_PORT: 9022,
            DRACHTIO_SECRET: 'cymru',
            JAMBONES_FEATURE_SERVERS: '127.0.0.1:9022:cymru',
            JAMBONES_FREESWITCH: '127.0.0.1:8021:JambonzR0ck\$',
            AUTHENTICATION_KEY: '$JWT_SECRET',
            JAMBONZ_RECORD_WS_USERNAME: 'jambonz',
            JAMBONZ_RECORD_WS_PASSWORD: '$JWT_SECRET',
            JAMBONZ_RECORD_WS_BASE_URL: '$RECORDING_WS_BASE_URL'
          }
        }]
      };
      EOF

      echo "Finished writing config file"

      # Configure freeswitch service
      sudo sed -i -e "s/JAMBONES_MYSQL_HOST=/JAMBONES_MYSQL_HOST=$MYSQL_HOST/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_USER=/JAMBONES_MYSQL_USER=$MYSQL_USER/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_PASSWORD=/JAMBONES_MYSQL_PASSWORD=$MYSQL_PASSWORD/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_DATABASE=/JAMBONES_MYSQL_DATABASE=jambones/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_REDIS_HOST=/JAMBONES_REDIS_HOST=$REDIS_HOST/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_REDIS_PORT=/JAMBONES_REDIS_PORT=$REDIS_PORT/g" /etc/systemd/system/freeswitch.service

      # On Hetzner, FreeSWITCH auto-detects local_ip_v4 as the public IP (eth0)
      # since the default route points there. Override it to use the private IP
      # by inserting an explicit set before the domain line that references it.
      echo "Overriding FreeSWITCH local_ip_v4 to '$PRIVATE_IP' in /usr/local/freeswitch/conf/vars.xml"
      echo "Before sed - lines around domain in vars.xml:"
      grep -n "local_ip_v4\|domain=" /usr/local/freeswitch/conf/vars.xml || true
      sudo sed -i "/<X-PRE-PROCESS cmd=\"set\" data=\"domain=/i\\  <X-PRE-PROCESS cmd=\"set\" data=\"local_ip_v4=$PRIVATE_IP\"/>" /usr/local/freeswitch/conf/vars.xml
      echo "After sed - lines around domain in vars.xml:"
      grep -n "local_ip_v4\|domain=" /usr/local/freeswitch/conf/vars.xml || true

      sudo systemctl daemon-reload
      sleep 5
      sudo systemctl restart drachtio
      echo "Waiting 5 seconds for drachtio to fully start..."
      sleep 5
      sudo systemctl restart freeswitch
      echo "Waiting 5 seconds for freeswitch to fully start..."
      sleep 5
      echo "Verifying FreeSWITCH local_ip_v4:"
      sudo /usr/local/freeswitch/bin/fs_cli -x "global_getvar local_ip_v4" || true
      echo "Verifying FreeSWITCH sofia status:"
      sudo /usr/local/freeswitch/bin/fs_cli -x "sofia status" || true

      # Configure telegraf to send to the monitoring server
      sudo sed -i -e "s/influxdb:8086/$WEB_MONITORING_PRIVATE_IP:8086/g" /etc/telegraf/telegraf.conf
      sudo systemctl restart telegraf

      sudo -u $USER bash -c "pm2 start $HOME/apps/ecosystem.config.js"
      sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u $USER --hp $HOME
      sudo -u $USER bash -c "pm2 save"
      sudo systemctl enable pm2-$USER.service

      echo "Feature Server setup complete!"

runcmd:
  - /tmp/configure-feature-server.sh

final_message: "Jambonz Feature Server is ready!"