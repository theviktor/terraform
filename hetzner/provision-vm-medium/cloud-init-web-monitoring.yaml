#cloud-config
# Cloud-init for Jambonz Web/Monitoring Server on Hetzner Cloud

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

write_files:
  - path: /tmp/configure-jambonz.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz Web/Monitoring server

      # Variables from Terraform
      MYSQL_HOST="${mysql_host}"
      MYSQL_PORT="${mysql_port}"
      MYSQL_USER="${mysql_user}"
      MYSQL_PASSWORD="${mysql_password}"
      MYSQL_DATABASE="${mysql_database}"
      REDIS_HOST="${redis_host}"
      REDIS_PORT="${redis_port}"
      JWT_SECRET="${jwt_secret}"
      URL_PORTAL="${url_portal}"
      VPC_CIDR="${vpc_cidr}"
      DEPLOY_RECORDING_CLUSTER="${deploy_recording_cluster}"
      ENABLE_OTEL="${enable_otel}"
      ENABLE_PCAPS="${enable_pcaps}"
      DATA_VOLUME_DEVICE="${data_volume_device}"

      echo "Starting jambonz Web/Monitoring server configuration for Hetzner"

      USER=jambonz
      HOME=/home/jambonz
      NGINX_CONFIG=/etc/nginx/sites-available/default

      # Mount data volume at /var/lib for persistent storage
      # Hetzner automount puts it at /mnt/HC_Volume_*, but we want /var/lib
      if [ -n "$DATA_VOLUME_DEVICE" ] && [ -b "$DATA_VOLUME_DEVICE" ]; then
        echo "Mounting data volume $DATA_VOLUME_DEVICE at /var/lib..."

        # Unmount if Hetzner automounted it somewhere else
        if mount | grep -q "$DATA_VOLUME_DEVICE"; then
          AUTOMOUNT_PATH=$(mount | grep "$DATA_VOLUME_DEVICE" | awk '{print $3}')
          echo "Volume already mounted at $AUTOMOUNT_PATH, unmounting..."
          umount "$AUTOMOUNT_PATH"
          # Remove automount fstab entry if present
          sed -i "\|$DATA_VOLUME_DEVICE|d" /etc/fstab
        fi

        # Stop services that write to /var/lib
        echo "Stopping services before /var/lib migration..."
        systemctl stop influxdb 2>/dev/null || true
        systemctl stop postgresql 2>/dev/null || true
        systemctl stop postgresql-12 2>/dev/null || true
        systemctl stop grafana-server 2>/dev/null || true
        systemctl stop redis-server 2>/dev/null || true
        systemctl stop redis 2>/dev/null || true
        systemctl stop telegraf 2>/dev/null || true
        systemctl stop cassandra 2>/dev/null || true

        # Mount volume temporarily and copy existing /var/lib contents
        TEMP_MOUNT=/mnt/data-volume
        mkdir -p $TEMP_MOUNT
        mount -o discard,defaults $DATA_VOLUME_DEVICE $TEMP_MOUNT

        # Only copy if volume is empty (first boot)
        if [ ! -f "$TEMP_MOUNT/.migrated" ]; then
          echo "First boot: copying /var/lib to data volume..."
          rsync -a /var/lib/ $TEMP_MOUNT/
          touch $TEMP_MOUNT/.migrated
        fi

        umount $TEMP_MOUNT
        rmdir $TEMP_MOUNT

        # Mount the volume at /var/lib
        mount -o discard,defaults $DATA_VOLUME_DEVICE /var/lib

        # Add fstab entry for persistence across reboots
        echo "$DATA_VOLUME_DEVICE /var/lib ext4 discard,defaults,nofail 0 2" >> /etc/fstab

        echo "Data volume mounted at /var/lib"

        # Restart services that were stopped
        systemctl start redis-server 2>/dev/null || systemctl start redis 2>/dev/null || true
        systemctl start postgresql 2>/dev/null || systemctl start postgresql-12 2>/dev/null || true
        systemctl start influxdb 2>/dev/null || true
        systemctl start grafana-server 2>/dev/null || true
        systemctl start telegraf 2>/dev/null || true
      else
        echo "No data volume device found ($DATA_VOLUME_DEVICE), using root disk for /var/lib"
      fi

      # Wait for private network metadata (may not be available immediately at boot)
      echo "Waiting for Hetzner private network metadata..."
      PRIVATE_IP=""
      for i in $(seq 1 30); do
          METADATA_RAW=$(curl -s http://169.254.169.254/hetzner/v1/metadata/private-networks)
          PRIVATE_IP=$(echo "$METADATA_RAW" | grep -oP '(?<=ip: )\S+' | head -1)
          if [ -n "$PRIVATE_IP" ]; then
              echo "Got private IP from metadata: '$PRIVATE_IP' (attempt $i/30)"
              break
          fi
          echo "Private network not yet available (attempt $i/30), metadata: $METADATA_RAW"
          sleep 2
      done
      if [ -z "$PRIVATE_IP" ]; then
          echo "FATAL: Could not determine private IP after 60 seconds"
          exit 1
      fi
      INSTANCE_ID=$(curl -s http://169.254.169.254/hetzner/v1/metadata/instance-id 2>/dev/null || hostname)
      PUBLIC_IP=$(curl -s http://169.254.169.254/hetzner/v1/metadata/public-ipv4 2>/dev/null || curl -s https://api.ipify.org)
      echo "PUBLIC_IP: '$PUBLIC_IP'"
      echo "INSTANCE_ID: '$INSTANCE_ID'"

      # Wait for database to be ready (MySQL on dedicated DB VM)
      echo "Waiting for MySQL to be ready..."
      MYSQL_OPTS="-h $MYSQL_HOST --port=$MYSQL_PORT -u $MYSQL_USER -D $MYSQL_DATABASE -p$MYSQL_PASSWORD"
      until mysql $MYSQL_OPTS -e "SELECT 1" &>/dev/null; do
        echo "MySQL not ready, waiting..."
        sleep 5
      done

      # Database schema and seed data are pre-loaded in the DB snapshot.
      # Update the public-apps URL to use the correct domain
      echo "Updating database with deployment-specific values..."
      mysql $MYSQL_OPTS -e "UPDATE service_providers SET root_domain = '$URL_PORTAL' WHERE root_domain = 'jambonz.cloud' OR root_domain IS NOT NULL" || true

      # Reset admin password to instance ID
      JAMBONES_ADMIN_INITIAL_PASSWORD=$INSTANCE_ID \
      JAMBONES_MYSQL_HOST=$MYSQL_HOST \
      JAMBONES_MYSQL_PORT=$MYSQL_PORT \
      JAMBONES_MYSQL_USER=$MYSQL_USER \
      JAMBONES_MYSQL_PASSWORD=$MYSQL_PASSWORD \
      JAMBONES_MYSQL_DATABASE=$MYSQL_DATABASE \
      $HOME/apps/api-server/db/reset_admin_password.js || true

      # Add system information
      mysql $MYSQL_OPTS -e "INSERT INTO system_information (domain_name, sip_domain_name, monitoring_domain_name) VALUES ('$URL_PORTAL', 'sip.$URL_PORTAL', 'grafana.$URL_PORTAL')" || true

      # Configure webapp
      echo "Configuring webapp..."
      echo "VITE_API_BASE_URL=http://$URL_PORTAL/api/v1" > $HOME/apps/webapp/.env
      API_BASE_URL="http://$URL_PORTAL/api/v1"
      TAG="<script>window.JAMBONZ = { API_BASE_URL: '$API_BASE_URL'};</script>"
      sed -i -e "\@</head>@i\ $TAG" $HOME/apps/webapp/dist/index.html || true

      echo "Writing $HOME/apps/ecosystem.config.js..."
      cat << EOF > $HOME/apps/ecosystem.config.js
      module.exports = {
        apps : [
        {
          name: 'api-server',
          cwd: '$HOME/apps/api-server',
          script: 'app.js',
          out_file: '$HOME/.pm2/logs/api-server.log',
          err_file: '$HOME/.pm2/logs/api-server.log',
          combine_logs: true,
          instance_var: 'INSTANCE_ID',
          exec_mode: 'cluster',
          instances: 0,
          autorestart: true,
          watch: false,
          max_memory_restart: '2G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JWT_SECRET: '$JWT_SECRET',
            AUTHENTICATION_KEY: '$JWT_SECRET',
            JAMBONES_MYSQL_HOST: '$MYSQL_HOST',
            JAMBONES_MYSQL_USER: '$MYSQL_USER',
            JAMBONES_MYSQL_PASSWORD: '$MYSQL_PASSWORD',
            JAMBONES_MYSQL_DATABASE: 'jambones',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: '$REDIS_HOST',
            JAMBONES_REDIS_PORT: $REDIS_PORT,
            JAMBONE_API_VERSION: 'v1',
            JAMBONES_TIME_SERIES_HOST: '127.0.0.1',
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            HTTP_PORT: 3000,
            JAEGER_BASE_URL: 'http://127.0.0.1:16686',
            HOMER_BASE_URL: 'http://127.0.0.1:9080',
            HOMER_USERNAME: 'admin',
            HOMER_PASSWORD: 'sipcapture',
            JAMBONZ_RECORD_WS_USERNAME: 'jambonz',
            JAMBONZ_RECORD_WS_PASSWORD: '$JWT_SECRET',
            },
        },
        {
          name: 'webapp',
          script: 'npm',
          cwd: '$HOME/apps/webapp',
          args: 'run serve'
        },
        {
          name: 'public-apps',
          cwd: '$HOME/apps/public-apps',
          script: 'app.js',
          out_file: '$HOME/.pm2/logs/public-apps',
          err_file: '$HOME/.pm2/logs/public-apps',
          combine_logs: true,
          instance_var: 'INSTANCE_ID',
          exec_mode: 'fork',
          instances: 1,
          autorestart: true,
          watch: false,
          max_memory_restart: '1G',
          env: {
            LOGLEVEL: 'info',
            HTTP_PORT: 3011,
            NRC_TIME_SERVICE_DID: '+16137451576'
          }
        }]
      };
      EOF

      echo "Finished writing config file"

      sudo -u $USER bash -c "pm2 start $HOME/apps/ecosystem.config.js"
      sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u $USER --hp $HOME
      sudo -u $USER bash -c "pm2 save"
      sudo systemctl enable pm2-$USER.service

      # Configure telegraf to send to the monitoring server (which is local)
      sudo sed -i -e "s/influxdb:8086/127.0.0.1:8086/g" /etc/telegraf/telegraf.conf
      sudo systemctl restart telegraf

      # Configure nginx
      sudo tee $NGINX_CONFIG > /dev/null << EOFNGINX
      server {
          listen 80;
          server_name $URL_PORTAL;
          location /api/ {
              rewrite ^/api/(.*)\$ /\$1 break;
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host \$host;
          }
          location / {
              proxy_pass http://127.0.0.1:3001;
              proxy_set_header Host \$host;
          }
      }
      server {
          listen 80;
          server_name api.$URL_PORTAL;
          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host \$host;
          }
      }
      server {
        listen 80;
        server_name grafana.$URL_PORTAL;
        location / {
          proxy_pass http://127.0.0.1:3010;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host \$host;
          proxy_cache_bypass \$http_upgrade;
        }
      }
      server {
        listen 80;
        server_name homer.$URL_PORTAL;
        location / {
          proxy_pass http://127.0.0.1:9080;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host \$host;
          proxy_cache_bypass \$http_upgrade;
        }
      }
      server {
        listen 80;
        server_name public-apps.$URL_PORTAL;
        location / {
          proxy_pass http://127.0.0.1:3011;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host \$host;
          proxy_cache_bypass \$http_upgrade;
        }
      }
      EOFNGINX

      sudo systemctl restart nginx

      # HEPlify server (receives HEP packets from SBC servers)
      if [[ "$ENABLE_PCAPS" == "true" ]]; then
        sudo systemctl restart heplify-server.service || true
      else
        sudo systemctl stop heplify-server.service || true
        sudo systemctl disable heplify-server.service || true
      fi

      # OTEL tracing (Cassandra + Jaeger)
      if [[ "$ENABLE_OTEL" == "true" ]]; then
        echo "Restarting cassandra..."
        sudo systemctl restart cassandra.service || true
        sleep 60
        echo "Restarting jaeger"
        sudo systemctl restart jaeger-collector.service || true
        sudo systemctl restart jaeger-query.service || true
      else
        echo "OTEL tracing disabled — stopping cassandra and jaeger..."
        sudo systemctl stop cassandra.service || true
        sudo systemctl stop jaeger-collector.service || true
        sudo systemctl stop jaeger-query.service || true
        sudo systemctl disable cassandra.service || true
        sudo systemctl disable jaeger-collector.service || true
        sudo systemctl disable jaeger-query.service || true
      fi

      # Configure upload_recordings service
      sudo sed -i -e "s/MYSQL_HOST=/MYSQL_HOST=$MYSQL_HOST/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/MYSQL_USER=/MYSQL_USER=$MYSQL_USER/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/MYSQL_PASSWORD=/MYSQL_PASSWORD=$MYSQL_PASSWORD/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/MYSQL_DATABASE=/MYSQL_DATABASE=jambones/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/BASIC_AUTH_USERNAME=/BASIC_AUTH_USERNAME=jambonz/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/BASIC_AUTH_PASSWORD=/BASIC_AUTH_PASSWORD=$JWT_SECRET/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/ENCRYPTION_SECRET=/ENCRYPTION_SECRET=$JWT_SECRET/g" /etc/systemd/system/upload_recordings.service

      sudo systemctl daemon-reload
      sudo systemctl enable upload_recordings
      sudo systemctl start upload_recordings

      # Check if recording cluster is deployed
      if [[ "$DEPLOY_RECORDING_CLUSTER" == "true" ]]; then
        echo "Recording cluster is deployed, disabling local upload_recordings service"
        sudo systemctl stop upload_recordings 2>/dev/null || true
        sudo systemctl disable upload_recordings 2>/dev/null || true
      fi

      echo "Web + monitoring server setup complete!"

runcmd:
  - /tmp/configure-jambonz.sh

final_message: "Jambonz Web/Monitoring server is ready!"